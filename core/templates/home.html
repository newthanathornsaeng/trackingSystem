<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tourist Tracking System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            height: 100vh;
            display: flex;
            align-items: center;
        }
        .hero-section {
            background: white;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            padding: 40px;
            text-align: center;
        }
        .hero-icon {
            font-size: 5rem;
            color: #5e72e4;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="hero-section">
                <i class="fas fa-map-marked-alt hero-icon"></i>
                <h1 class="fw-bold mb-3">Tourist Tracking System</h1>
                <p class="text-muted mb-4">ระบบติดตามพิกัดและจัดการข้อมูลการเดินทาง</p>
                
                <div class="d-grid gap-3">
                    <a href="{% url 'core:dashboard' %}" class="btn btn-primary btn-lg rounded-pill shadow-sm" style="background: #5e72e4; border: none;">
                        <i class="fas fa-chart-line me-2"></i> เข้าสู่หน้า Dashboard
                    </a>
                    
                    <a href="{% url 'core:login' %}" class="btn btn-outline-secondary btn-lg rounded-pill shadow-sm">
                        <i class="fas fa-sign-in-alt me-2"></i> เข้าสู่ระบบเจ้าหน้าที่
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
