<!DOCTYPE html>
<html lang="th">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        /* 🚨 บังคับให้โครงสร้างหน้าจอสูง 100% เสมอ */
        html, body {
            height: 100%;
            margin: 0;
            font-family: 'Sarabun', sans-serif; 
        }
        
        body { 
            display: flex; 
            flex-direction: column; 
        }
        
        .navbar-custom { 
            background-color: #1a237e; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
            z-index: 10;
        }
        
        /* 🚨 สั่งให้ Hero Section ถีบตัวเองให้เต็มพื้นที่สีขาวที่เหลือทั้งหมด */
        .hero-section {
            flex: 1; 
            background: linear-gradient(rgba(26, 35, 126, 0.8), rgba(26, 35, 126, 0.9)), url('https://images.unsplash.com/photo-1524661135-423995f22d0b?ixlib=rb-1.2.1&auto=format&fit=crop&w=1920&q=80') center/cover no-repeat;

            border-bottom: 5px solid #ffab00;
            display: flex;
            flex-direction: column;
            justify-content: center; /* จัดเนื้อหาให้อยู่กึ่งกลางหน้าจอพอดี */
            align-items: center;
        }
        
        .footer-custom {
            background-color: #f8f9fa;
        }
    </style>
</head>

    <nav class="navbar navbar-expand navbar-dark navbar-custom py-3">

            <div>
                <a href="{% url 'core:login' %}" class="btn btn-outline-light px-3 rounded-pill text-nowrap">สำหรับเจ้าหน้าที่</a>

        </div>
    </nav>

    <div class="hero-section text-center">
        <div class="container py-5">
            <i class="fas fa-map-marked-alt fa-5x mb-4 text-warning"></i>
            <h1 class="display-5 fw-bold mb-3">ระบบติดตามและจัดการข้อมูลเส้นทาง</h1>

            <a href="{% url 'core:dashboard' %}" class="btn btn-warning btn-lg px-4 px-md-5 rounded-pill shadow mt-2 fw-bold text-dark">
                <i class="fas fa-globe-asia me-2"></i>เข้าสู่ระบบจัดการ (Dashboard)
            </a>
        </div>
    </div>

    <footer class="text-center py-3 text-muted footer-custom">
        <div class="container"><small>&copy; 2026 Tracking System Project. All Rights Reserved.</small></div>
