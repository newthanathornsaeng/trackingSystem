<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>เข้าสู่ระบบ | Tracking System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #e9ecef; display: flex; align-items: center; height: 100vh; }
        .login-card { border: none; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); overflow: hidden; }
        .login-header { background-color: #1a237e; color: white; padding: 30px; text-align: center; border-bottom: 4px solid #ffab00; }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card login-card">
                    <div class="login-header">
                        <i class="fas fa-user-shield fa-3x mb-3"></i>
                        <h4 class="fw-bold">Administrator Login</h4>
                        <p class="mb-0 small text-light opacity-75">เฉพาะเจ้าหน้าที่ผู้ดูแลระบบเท่านั้น</p>
                    </div>
                    <div class="card-body p-5">
                        <form method="post">
                            {% csrf_token %}
                            <div class="mb-4">
                                {{ form.as_p }}
                            </div>
                            <button type="submit" class="btn btn-primary w-100 py-2 rounded-pill" style="background-color: #1a237e; border: none;">
                                <i class="fas fa-sign-in-alt me-2"></i> เข้าสู่ระบบ
                            </button>
                        </form>
                        <div class="text-center mt-4">
                            <a href="{% url 'core:home' %}" class="text-decoration-none text-muted small"><i class="fas fa-arrow-left me-1"></i> กลับหน้าหลัก</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        document.querySelectorAll('input').forEach(input => {
            if(input.type !== 'hidden') {
                input.classList.add('form-control');
                input.classList.add('mb-3');
            }
        });
    </script>
</body>
</html>
