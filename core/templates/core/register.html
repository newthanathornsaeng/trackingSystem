<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>ลงทะเบียนผู้ใช้งาน | Tracking System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f4f6f9; }
        .form-card { border: none; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border-top: 4px solid #1a237e; }
    </style>
    <script>
        function toggleForm() {
            var isThai = document.getElementById('t_thai').checked;
            
            // จัดการช่องบัตร ปชช.
            document.getElementById('thai_sec').style.display = isThai ? 'block' : 'none';
            document.getElementById('national_id').required = isThai;
            
            // จัดการช่องพาสปอร์ต
            document.getElementById('for_sec').style.display = isThai ? 'none' : 'block';
            document.getElementById('passport_number').required = !isThai;
            
            // ล้างค่าข้อมูลเมื่อสลับแท็บ ป้องกันการส่งข้อมูลผิดช่อง
            if(isThai) {
                document.getElementById('passport_number').value = '';
            } else {
                document.getElementById('national_id').value = '';
            }
        }
        function validateThaiID(input) {
            let id = input.value;
            
            // ถ้ากรอกไม่ครบ 13 หลัก ให้เคลียร์สถานะแจ้งเตือนไว้ก่อน (ปล่อยให้ HTML5 บังคับความยาวแทน)
            if (id.length !== 13) {
                input.setCustomValidity('');
                return;
            }

            // สูตรคำนวณเช็คหลักที่ 13
            let sum = 0;
            for (let i = 0; i < 12; i++) {
                sum += parseInt(id.charAt(i)) * (13 - i);
            }
            let checkDigit = (11 - (sum % 11)) % 10;

            // เทียบผลลัพธ์ว่าตรงกับหลักที่ 13 ที่ผู้ใช้พิมพ์มาไหม
            if (checkDigit !== parseInt(id.charAt(12))) {
                input.setCustomValidity('เลขบัตรประชาชนไม่ถูกต้อง (ตรวจสอบการพิมพ์ผิด)');
                input.reportValidity(); // เด้งข้อความเตือนทันที
            } else {
                input.setCustomValidity(''); // ถูกต้อง! ผ่านได้
            }
        }
        window.onload = toggleForm;
    </script>
</head>
<body class="py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="mb-3">
                    <a href="{% url 'core:dashboard' %}" class="btn btn-outline-secondary btn-sm"><i class="fas fa-arrow-left me-1"></i> กลับหน้า Dashboard</a>
                </div>
                
                <div class="card form-card">
                    <div class="card-body p-5">
                        <div class="text-center mb-5">
                            <h3 class="fw-bold" style="color: #1a237e;">แบบฟอร์มลงทะเบียนผู้ใช้งาน</h3>
                            <p class="text-muted">กรุณากรอกข้อมูลให้ครบถ้วนเพื่อผูกกับอุปกรณ์ติดตาม</p>
                        </div>

                        <form method="post" action="{% url 'core:register' %}">
                            {% csrf_token %}
                            
                            <h6 class="text-primary fw-bold border-bottom pb-2 mb-3"><i class="fas fa-globe-asia me-2"></i>ส่วนที่ 1: ข้อมูลสัญชาติ (Nationality)</h6>
                            <div class="mb-4">
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="nationality" id="t_thai" value="thai" checked onchange="toggleForm()">
                                    <label class="form-check-label" for="t_thai">ชาวไทย (Thai Citizen)</label>
                                </div>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="nationality" id="t_for" value="foreigner" onchange="toggleForm()">
                                    <label class="form-check-label" for="t_for">ชาวต่างชาติ (Foreigner)</label>
                                </div>
                            </div>

                            <h6 class="text-primary fw-bold border-bottom pb-2 mb-3"><i class="fas fa-user me-2"></i>ส่วนที่ 2: ข้อมูลส่วนบุคคล (Personal Info)</h6>
                            <div class="row mb-4">
                                <div class="col-md-5 mb-3">
                                    <label class="form-label small text-muted">ชื่อ (First Name) *</label>
                                    <input type="text" name="first_name" class="form-control" required 
                                           oninput="this.value = this.value.replace(/[^a-zA-Zก-๙\s]/g, '')"
                                           title="กรุณากรอกเฉพาะตัวอักษรเท่านั้น">
                                </div>
                                <div class="col-md-5 mb-3">
                                    <label class="form-label small text-muted">นามสกุล (Last Name) *</label>
                                    <input type="text" name="last_name" class="form-control" required
                                           oninput="this.value = this.value.replace(/[^a-zA-Zก-๙\s]/g, '')"
                                           title="กรุณากรอกเฉพาะตัวอักษรเท่านั้น">
                                </div>
                                <div class="col-md-2 mb-3">
                                    <label class="form-label small text-muted">อายุ (Age) *</label>
                                    <input type="number" name="age" class="form-control" required min="1" max="120"
                                           oninput="this.value = this.value.replace(/[^0-9]/g, '')">
                                </div>
                                
                                <div class="col-md-12 mt-2" id="thai_sec">
                                    <label class="form-label small text-muted text-danger fw-bold">เลขประจำตัวประชาชน 13 หลัก *</label>
                                    
                                    <input type="text" name="national_id" id="national_id" class="form-control" 
                                           maxlength="13" minlength="13" placeholder="กรอกเลข 13 หลัก"
                                           pattern="\d{13}" title="กรุณากรอกตัวเลขให้ครบ 13 หลัก"
                                           oninput="this.value = this.value.replace(/[^0-9]/g, '')"
                                           onkeyup="validateThaiID(this)">
                                </div>
                                <div class="col-md-12 mt-2" id="for_sec" style="display: none;">
                                    <label class="form-label small text-muted text-danger fw-bold">หมายเลขพาสปอร์ต (Passport Number) *</label>
                                    <input type="text" name="passport_number" id="passport_number" class="form-control" 
                                           placeholder="กรอกหมายเลขพาสปอร์ต"
                                           oninput="this.value = this.value.replace(/[^a-zA-Z0-9]/g, '').toUpperCase()">
                                </div>
                            </div>

                            <h6 class="text-primary fw-bold border-bottom pb-2 mb-3"><i class="fas fa-microchip me-2"></i>ส่วนที่ 3: ข้อมูลอุปกรณ์ (Device Integration)</h6>
                            <div class="mb-5">
                                <label class="form-label small text-muted text-danger fw-bold">รหัสอุปกรณ์ติดตาม (Device ID) *</label>
                                <input type="text" name="device_code" class="form-control form-control-lg bg-light text-primary fw-bold" 
                                       placeholder="ตัวอย่าง: TRK001" required
                                       oninput="this.value = this.value.replace(/[^a-zA-Z0-9-]/g, '').toUpperCase()">
                            </div>

                            <div class="d-grid gap-2">
                                <button type="submit" class="btn btn-primary btn-lg" style="background-color: #1a237e;"><i class="fas fa-save me-2"></i> บันทึกข้อมูลการลงทะเบียน</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
